function Spark({ size = 20, style }) {
  // Gemini 4-point sparkle
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={style} aria-hidden="true">
      <defs>
        <linearGradient id="spk" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
          <stop offset="0" stopColor="#4285F4" />
          <stop offset="0.5" stopColor="#9168C9" />
          <stop offset="1" stopColor="#D96570" />
        </linearGradient>
      </defs>
      <path
        d="M12 0c.5 5.5 6 11 12 12-6 1-11.5 6.5-12 12-.5-5.5-6-11-12-12C6 11 11.5 5.5 12 0Z"
        fill="url(#spk)"
      />
    </svg>
  );
}

function Profile() {
  const [dark, setDark] = useState(true);
  const [active, setActive] = useState("home");
  const [openIdx, setOpenIdx] = useState(null);
  const [storyIdx, setStoryIdx] = useState(null);
  const [copied, setCopied] = useState(false);
  const sectionRefs = useRef({});

  const t = dark
    ? {
        bg: "#0B0D12",
        bgAlt: "#0F131B",
        surface: "#151A24",
        border: "#242B37",
        text: "#E8EAED",
        muted: "#9AA0A6",
        navBg: "rgba(11,13,18,0.72)",
        chip: "#1B2130",
      }
    : {
        bg: "#FFFFFF",
        bgAlt: "#F6F8FC",
        surface: "#FFFFFF",
        border: "#E6E9EF",
        text: "#1F2329",
        muted: "#5F6368",
        navBg: "rgba(255,255,255,0.75)",
        chip: "#F1F4FA",
      };

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const EMAIL = "youngman.notkid@gmail.com";
  const copyEmail = async () => {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(EMAIL);
      } else {
        const ta = document.createElement("textarea");
        ta.value = EMAIL;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (e) {
      setCopied(false);
    }
  };

  useEffect(() => {
    const ids = ["home", ...NAV.map((n) => n.id)];
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) setActive(e.target.id);
        });
      },
      { rootMargin: "-45% 0px -50% 0px", threshold: 0 }
    );
    ids.forEach((id) => {
      const el = document.getElementById(id);
      if (el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") {
        setOpenIdx(null);
        setStoryIdx(null);
      }
    };
    const anyOpen = openIdx !== null || storyIdx !== null;
    if (anyOpen) {
      document.addEventListener("keydown", onKey);
      document.body.style.overflow = "hidden";
    }
    return () => {
      document.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [openIdx, storyIdx]);

  const openProject = openIdx !== null ? PROJECTS[openIdx] : null;
  const openStory = storyIdx !== null ? STORY[storyIdx] : null;

  const gradText = {
    backgroundImage: GEMINI_GRADIENT,
    WebkitBackgroundClip: "text",
    backgroundClip: "text",
    color: "transparent",
    WebkitTextFillColor: "transparent",
  };

  return (
    <div
      style={{ background: t.bg, color: t.text, fontFamily: "'Google Sans','Product Sans','Poppins','Pretendard',system-ui,-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Malgun Gothic',sans-serif" }}
      className="min-h-screen w-full transition-colors duration-500 antialiased"
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard-dynamic-subset.css');
        html{scroll-behavior:smooth;}
        .skill-card{border:1px solid var(--bd);background:var(--sf);transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .25s ease,border-color .25s ease;}
        .skill-card:hover{transform:translateY(-4px);border-color:#9168C9;box-shadow:0 14px 34px rgba(66,133,244,.18);}
        @media (prefers-reduced-motion: reduce){.skill-card:hover{transform:none;}}
        @keyframes floatOrb{0%,100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);}50%{transform:translate(-50%,-52%) scale(1.12) rotate(18deg);}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        .fade-up{animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both;}
        .orb{animation:floatOrb 14s ease-in-out infinite;}
        @media (prefers-reduced-motion: reduce){.orb{animation:none;}.fade-up{animation:none;}html{scroll-behavior:auto;}}
      `}</style>

      {/* ===== NAV ===== */}
      <nav
        className="fixed top-0 inset-x-0 z-50 backdrop-blur-xl"
        style={{ background: t.navBg, borderBottom: `1px solid ${t.border}` }}

            className="flex items-center gap-2 font-semibold tracking-tight text-lg"

            <Spark size={20} />
            <span>김영웅</span>
          </button>

          <div className="flex items-center gap-1 sm:gap-2">
            <div className="hidden sm:flex items-center gap-1">
              {NAV.map((n) => (
                <button
                  key={n.id}
                  onClick={() => scrollTo(n.id)}

      </div>
      {children}
    </div>
  );
}

function SectionLabel({ children, t }) {

function InfoCard({ title, children, t }) {
